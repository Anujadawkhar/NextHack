<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Meeting Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>🚀 Meeting Accountability Tracker</h1>
  <h3 id="userDisplay"></h3>
  <button type="button" onclick="logout()">Logout</button>
</header>

<div class="container">

  <!-- Create Meeting -->
  <div class="card">
    <h2>Create Meeting</h2>
    <input id="mTitle" placeholder="Title">
    <input id="mDate" type="date">
    <input id="mDesc" placeholder="Agenda">
    <button type="button" onclick="createMeeting()">Create</button>
  </div>

  <!-- SHOW MEETING -->
  <div class="card">
    <h2>Current Meeting</h2>
    <div id="meetingDisplay">No meeting created</div>
  </div>

  <!-- Decisions -->
  <div class="card">
    <h2>Decisions</h2>
    <input id="decision" placeholder="Add decision">
    <button type="button" onclick="addDecision()">Add Decision</button>
    <ul id="decisionList"></ul>
  </div>

  <!-- Tasks -->
  <div class="card">
    <h2>Action Items</h2>

    <input id="task" placeholder="Task">

    <input type="date" id="deadline">

    <select id="status">
      <option>OPEN</option>
      <option>IN_PROGRESS</option>
      <option>DONE</option>
    </select>

    <button type="button" onclick="addTask()">Add Task</button>
  </div>

  <!-- Personal Feed -->
  <div class="card">
    <h2>My Tasks</h2>
    <ul id="taskList"></ul>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
